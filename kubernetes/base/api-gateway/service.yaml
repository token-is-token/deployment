apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: llm-share
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
    - port: 443
      targetPort: 8443
      protocol: TCP
      name: https
  selector:
    app: api-gateway
