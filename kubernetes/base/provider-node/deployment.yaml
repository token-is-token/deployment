apiVersion: apps/v1
kind: Deployment
metadata:
  name: provider-node
  namespace: llm-share
spec:
  replicas: 2
  selector:
    matchLabels:
      app: provider-node
  template:
    metadata:
      labels:
        app: provider-node
        version: v1
    spec:
      containers:
        - name: provider-node
          image: llm-share/provider-node:latest
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: provider-node-config
            - secretRef:
                name: provider-node-secrets
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
              nvidia.com/gpu: "1"
            limits:
              memory: "2Gi"
              cpu: "1000m"
              nvidia.com/gpu: "1"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
