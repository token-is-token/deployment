apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: llm-share

bases:
  - ../../base

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: api-gateway
      spec:
        replicas: 3
    target:
      kind: Deployment
      name: api-gateway
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: provider-node
      spec:
        replicas: 3
    target:
      kind: Deployment
      name: provider-node
